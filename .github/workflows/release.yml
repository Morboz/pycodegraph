name: Release

on:
  push:
    tags:
      - "v*"

permissions: {}

jobs:
  verify-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check tag matches pyproject.toml version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PYPROJECT_VERSION="$(awk -F'"' '/^version = "/{print $2}' pyproject.toml)"
          echo "Tag version:       $TAG_VERSION"
          echo "pyproject.toml:    $PYPROJECT_VERSION"
          if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "::error::Version mismatch — tag is $TAG_VERSION but pyproject.toml has $PYPROJECT_VERSION"
            exit 1
          fi

  lint:
    runs-on: ubuntu-latest
    needs: verify-version
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - run: uv sync --extra dev --group dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run lint-imports

  test:
    runs-on: ubuntu-latest
    needs: verify-version
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - run: uv sync --extra dev --group dev
      - run: uv run pytest tests/ --tb=short -q

  type-check:
    runs-on: ubuntu-latest
    needs: verify-version
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - run: uv sync --extra dev --group dev
      - run: uv run mypy src/pycodegraph

  build-and-release:
    runs-on: ubuntu-latest
    needs: [lint, test, type-check]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - run: uv sync --extra dev --group dev
      - run: uv build
      - name: Create GitHub Release and upload wheel
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*.whl
